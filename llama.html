<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaHTML Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="highlight-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --chat-max-width: 1200px; }
        html, body { height: 100vh; overflow: hidden; }
        .app-container { height: 100vh; }
        .main-content { height: 100vh; overflow: hidden; position: relative; }
        .chat-container { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; max-width: var(--chat-max-width); margin: 0 auto; padding: 1rem; }
        
        /* Custom Scrollbar */
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background-color: rgba(128,128,128, 0.3); border-radius: 20px; }

        .message-body pre { position: relative; padding-top: 40px; }
        .code-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; }
        .code-action-button { padding: 4px 8px; font-size: 12px; background-color: var(--bs-secondary-bg); border: 1px solid var(--bs-border-color); border-radius: 4px; cursor: pointer; opacity: 0.8; transition: opacity 0.2s; }
        .code-action-button:hover { opacity: 1; background-color: var(--bs-tertiary-bg); }
        
        #chatInput { resize: none; max-height: 200px; }
        .delete-btn { opacity: 0; transition: opacity 0.2s; }
        .list-group-item:hover .delete-btn { opacity: 1; }
        
        /* Utility */
        .staged-file { cursor: pointer; user-select: none; }
        .staged-file:hover { text-decoration: underline; color: var(--bs-primary); }
    </style>
</head>
<body>
    <div class="app-container d-flex">
        <!-- Mobile Sidebar Toggle -->
        <button class="btn btn-light d-md-none m-2 position-fixed" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar" style="z-index: 1045;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/></svg>
        </button>

        <!-- Sidebar -->
        <aside class="d-flex flex-column flex-shrink-0 p-3 bg-body-tertiary offcanvas-md offcanvas-start" tabindex="-1" id="sidebar" style="width: 280px;">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title">LlamaHTML</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebar" aria-label="Close"></button>
            </div>
            <div class="d-grid gap-2 mb-3">
                <button class="btn btn-primary" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="list-group list-group-flush border-bottom scrollarea flex-grow-1" id="sessionsList">
            </div>
            <div class="mt-3">
                <input type="url" class="form-control mb-2" id="serverUrl" placeholder="http://127.0.0.1:8080">
                <div class="d-grid gap-2">
                    <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#settingsModal">Settings</button>
                    <button class="btn btn-sm btn-outline-secondary" id="themeSwitcher">🌙</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content flex-grow-1 d-flex flex-column">
            <div class="chat-container p-3" id="chatContainer">
                <div class="empty-state text-center h-100 d-flex flex-column justify-content-center">
                    <h2>LlamaHTML</h2>
                    <p class="text-body-secondary">Connected via IndexedDB for Firefox Stability</p>
                </div>
            </div>
            
            <div class="chat-input-container p-3 bg-body-tertiary border-top">
                <div id="stagedFilesArea" class="d-flex flex-wrap gap-2 mb-2" style="display: none;"></div>
                <div class="input-group">
                    <textarea class="form-control" id="chatInput" placeholder="Message Llama... (Ctrl+Enter to send)" rows="1"></textarea>
                    <label for="fileInput" class="btn btn-outline-secondary">📎</label>
                    <input type="file" id="fileInput" multiple class="d-none">
                    <button class="btn btn-primary" id="sendButton">Send</button>
                </div>
                <div class="status-bar text-center text-body-secondary small mt-2" id="statusBar"></div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
					<h5 class="modal-title">Model Settings</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Temperature</label><input type="number" class="form-control" id="temperature" step="0.1" value="0.7"></div>
                    <div class="mb-3">
						<label class="form-label">Max Tokens</label>
						<input type="number" class="form-control" id="nPredict" value="32000">
					</div>
                    <div class="mb-3">
						<label class="form-label">Top P</label>     
						<input type="number" class="form-control" id="topP" min="0" max="1" step="0.01" value="0.95">
						<small class="form-text text-muted">Nucleus sampling.</small>
					</div>
                    <div class="mb-3">
						<label class="form-label">Top K</label>
						<input type="number" class="form-control" id="topK" min="1" step="1" value="40">
						<small class="form-text text-muted">Top-k sampling.</small>
					</div>
                    <div class="mb-3">
						<label class="form-label">Stop Sequences</label>
						<input type="text" class="form-control" id="stopSequences" value="USER:, \nUSER:, <|user|>">
						<small class="form-text text-muted">Comma-separated strings.</small>
					</div>
                    <div class="form-check">
						<input class="form-check-input" type="checkbox" id="rememberServerUrl">
						<label class="form-check-label" for="rememberServerUrl">Remember Server URL</label>
					</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /** 
         * Optimized LlamaHTML Application
         * Refactored for performance, state encapsulation, and cleaner DB handling.
         */
        
        const CONFIG = {
            db: 'LlamaChatDB',
            storeChats: 'chats',
            storeMeta: 'metadata'
        };

        // --- Database Layer (Singleton Pattern) ---
        const DB = {
            instance: null,
            
            async connect() {
                if (this.instance) return this.instance;
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(CONFIG.db, 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(CONFIG.storeChats)) db.createObjectStore(CONFIG.storeChats, { keyPath: 'id' });
                        if (!db.objectStoreNames.contains(CONFIG.storeMeta)) db.createObjectStore(CONFIG.storeMeta, { keyPath: 'id' });
                    };
                    request.onsuccess = () => { this.instance = request.result; resolve(request.result); };
                    request.onerror = () => reject(request.error);
                });
            },

            async saveChat(id, history, name) {
                const db = await this.connect();
                const tx = db.transaction([CONFIG.storeChats, CONFIG.storeMeta], 'readwrite');
                tx.objectStore(CONFIG.storeChats).put({ id, history });
                tx.objectStore(CONFIG.storeMeta).put({ id, name, lastUpdate: Date.now() });
                return new Promise(r => tx.oncomplete = r);
            },

            async getChat(id) {
                const db = await this.connect();
                return new Promise(r => {
                    const req = db.transaction(CONFIG.storeChats).objectStore(CONFIG.storeChats).get(id);
                    req.onsuccess = () => r(req.result);
                });
            },

            async getAllSessions() {
                const db = await this.connect();
                return new Promise(r => {
                    const req = db.transaction(CONFIG.storeMeta).objectStore(CONFIG.storeMeta).getAll();
                    req.onsuccess = () => r(req.result.sort((a,b) => b.lastUpdate - a.lastUpdate));
                });
            },

            async deleteChat(id) {
                const db = await this.connect();
                const tx = db.transaction([CONFIG.storeChats, CONFIG.storeMeta], 'readwrite');
                tx.objectStore(CONFIG.storeChats).delete(id);
                tx.objectStore(CONFIG.storeMeta).delete(id);
                return new Promise(r => tx.oncomplete = r);
            }
        };

        // --- Application Logic ---
        const App = {
            state: {
                chatHistory: [],
                currentSessionId: null,
                stagedFiles: [],
                abortController: null
            },

            elements: {},

            init() {
                this.elements = {
                    serverUrl: document.getElementById('serverUrl'),
                    chatInput: document.getElementById('chatInput'),
                    sendButton: document.getElementById('sendButton'),
                    statusBar: document.getElementById('statusBar'),
                    chatContainer: document.getElementById('chatContainer'),
                    sessionsList: document.getElementById('sessionsList'),
                    fileInput: document.getElementById('fileInput'),
                    stagedFilesArea: document.getElementById('stagedFilesArea'),
                    themeSwitcher: document.getElementById('themeSwitcher')
                };

                // Configuration
                this.elements.serverUrl.value = localStorage.getItem('llamaServerUrl') || "http://127.0.0.1:8080";
                marked.setOptions({
                    highlight: (code, lang) => {
                        const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                        return hljs.highlight(code, { language }).value;
                    },
                    breaks: true,
                    gfm: true
                });

                // Event Listeners
                this.setupEvents();
                
                // Start
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-bs-theme', savedTheme);
                this.loadSessionList();
                this.startNewSession();
            },

            setupEvents() {
                this.elements.sendButton.addEventListener('click', () => this.sendPrompt());
                document.getElementById('newChatBtn').addEventListener('click', () => this.startNewSession());
                
                // Ctrl+Enter to send
                this.elements.chatInput.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') this.sendPrompt();
                });

                this.elements.fileInput.addEventListener('change', (e) => this.handleFileSelection(e));
                
                // Sidebar interactions
                this.elements.sessionsList.addEventListener('click', async (e) => {
                    const btn = e.target.closest('.delete-btn');
                    const item = e.target.closest('.list-group-item');
                    if (!item) return;
                    
                    const id = item.dataset.sessionId;
                    if (btn) {
                        e.stopPropagation();
                        if(confirm("Delete this chat?")) {
                            await DB.deleteChat(id);
                            if(this.state.currentSessionId === id) this.startNewSession();
                            this.loadSessionList();
                        }
                    } else {
                        await this.loadSession(id);
                    }
                });

                this.elements.serverUrl.addEventListener('change', () => {
                    localStorage.setItem('llamaServerUrl', this.elements.serverUrl.value);
                });

                this.elements.themeSwitcher.addEventListener('click', () => {
                    const current = document.documentElement.getAttribute('data-bs-theme');
                    const target = current === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-bs-theme', target);
                    localStorage.setItem('theme', target);               
                });
            },

            async sendPrompt() {
                const promptText = this.elements.chatInput.value.trim();
                if (!promptText && this.state.stagedFiles.length === 0) return;

                if (!this.state.currentSessionId) {
                    this.state.currentSessionId = Date.now().toString();
                }

                // Prepare content
                let fileContent = "";
                this.state.stagedFiles.forEach(f => {
                    if (f.content) fileContent += `\n[File: ${f.name}]\n${f.content}\n`;
                });

                const fullContent = fileContent + promptText;
                this.state.chatHistory.push({ role: 'user', content: fullContent });
                
                // Clear UI inputs
                this.elements.chatInput.value = '';
                this.state.stagedFiles = [];
                this.renderStagedFiles();
                this.renderChatHistory(); // Render user message

                // Prepare model response
                this.state.abortController = new AbortController();
                this.updateButtonUI(true);
                
                const modelMsg = { role: 'model', content: '' };
                this.state.chatHistory.push(modelMsg);
                const modelMsgIdx = this.state.chatHistory.length - 1;

                try {
                    const response = await fetch(`${this.elements.serverUrl.value}/completion`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            prompt: this.formatPrompt(this.state.chatHistory.slice(0, -1)),
                            stream: true,
                            temperature: parseFloat(document.getElementById('temperature').value),
                            n_predict: parseInt(document.getElementById('nPredict').value)
                        }),
                        signal: this.state.abortController.signal
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let remainder = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        remainder += decoder.decode(value, { stream: true });
                        let lines = remainder.split('\n');
                        remainder = lines.pop();

                        for (const line of lines) {
                            const cleanLine = line.trim();
                            if (!cleanLine.startsWith('data: ')) continue;
                            
                            try {
                                const data = JSON.parse(cleanLine.substring(6));
                                if (data.content) {
                                    this.state.chatHistory[modelMsgIdx].content += data.content;
                                    this.updateLastMessageUI(this.state.chatHistory[modelMsgIdx].content);
                                }
                            } catch (e) {
                                // Ignore partial JSON chunks
                            }
                        }
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') this.showStatus("Error connecting to server", "danger");
                } finally {
                    this.state.abortController = null;
                    this.updateButtonUI(false);
                    
                    // Auto-save
                    const sessionName = this.state.chatHistory[0].content.substring(0, 30) + "...";
                    await DB.saveChat(this.state.currentSessionId, this.state.chatHistory, sessionName);
                    this.loadSessionList();
                }
            },

            formatPrompt(history) {
                return history.map(m => `${m.role === 'user' ? 'USER' : 'ASSISTANT'}: ${m.content}`).join('\n') + '\nASSISTANT:';
            },

            // Optimization: Only update the last message bubble instead of re-rendering everything
            updateLastMessageUI(content) {
                const bubbles = this.elements.chatContainer.querySelectorAll('.message-body');
                const lastBubble = bubbles[bubbles.length - 1];
                if (lastBubble) {
                    lastBubble.innerHTML = marked.parse(content);
                    this.elements.chatContainer.scrollTop = this.elements.chatContainer.scrollHeight;
                }
            },

            renderChatHistory() {
                this.elements.chatContainer.innerHTML = '';
                this.state.chatHistory.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `chat-message ${msg.role}-message d-flex gap-3 mb-3`;
                    div.innerHTML = `
                        <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; flex-shrink:0">
                            ${msg.role === 'user' ? 'U' : 'L'}
                        </div>
                        <div class="message-body p-3 border rounded-3 w-100 bg-body">
                            ${marked.parse(msg.content)}
                        </div>
                    `;
                    this.elements.chatContainer.appendChild(div);
                });
                this.elements.chatContainer.scrollTop = this.elements.chatContainer.scrollHeight;
            },

            async loadSession(id) {
                const data = await DB.getChat(id);
                if (data) {
                    this.state.currentSessionId = id;
                    this.state.chatHistory = data.history;
                    this.renderChatHistory();
                    this.loadSessionList();
                }
            },

            startNewSession() {
                this.state.currentSessionId = null;
                this.state.chatHistory = [];
                this.elements.chatContainer.innerHTML = `
                    <div class="empty-state text-center h-100 d-flex flex-column justify-content-center">
                        <h2>LlamaHTML</h2>
                        <p class="text-body-secondary">New local session started.</p>
                    </div>`;
                this.loadSessionList();
            },

            async loadSessionList() {
                const sessions = await DB.getAllSessions();
                this.elements.sessionsList.innerHTML = sessions.map(s => `
                    <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center ${s.id === this.state.currentSessionId ? 'active' : ''}" data-session-id="${s.id}">
                        <div class="text-truncate" style="max-width: 180px;">${this.escapeHtml(s.name)}</div>
                        <button class="btn-close btn-close-white delete-btn" style="font-size: 0.7rem;"></button>
                    </a>
                `).join('');
            },

            handleFileSelection(e) {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.state.stagedFiles.push({ name: file.name, content: ev.target.result });
                        this.renderStagedFiles();
                    };
                    reader.readAsText(file);
                });
            },

            renderStagedFiles() {
                this.elements.stagedFilesArea.style.display = this.state.stagedFiles.length ? 'flex' : 'none';
                this.elements.stagedFilesArea.innerHTML = this.state.stagedFiles.map((f, i) => `
                    <span class="badge text-bg-secondary mb-2" onclick="App.removeStagedFile(${i})">${f.name}</span>
                `).join('');
            },

            removeStagedFile(index) {
                // In a real app, we'd make this a method on the DOM element or pass `this`
                // For simplicity in this inline script, we'll just splice the array and re-render
                // Note: This requires `App` to be in scope, which it is.
                // To make the onclick work properly with closure in innerHTML:
                this.state.stagedFiles.splice(index, 1);
                this.renderStagedFiles();
            },

            updateButtonUI(loading) {
                this.elements.sendButton.textContent = loading ? 'Stop' : 'Send';
                this.elements.sendButton.classList.toggle('btn-danger', loading);
                this.elements.sendButton.classList.toggle('btn-primary', !loading);
            },

            showStatus(msg, type) {
                this.elements.statusBar.textContent = msg;
                this.elements.statusBar.className = `status-bar text-center small mt-2 text-${type}`;
            },

            escapeHtml(unsafe) {
                return unsafe.replace(/[&<"']/g, m => ({'&':'&amp;','<':'&lt;','"':'&quot;',"'":"&#039;"}[m]));
            }
        };

        // Expose removeStagedFile to window for inline onclick handling
        window.removeStagedFile = (index) => App.removeStagedFile(index);

        // Initialize
        App.init();
    </script>
</body>
</html>
